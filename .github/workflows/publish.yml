name: Publish to npm

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      dry-run:
        description: "Validate package without publishing"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Build
        run: pnpm run build

      - name: Verify build output
        run: |
          echo "Verifying dist contents..."

          test -f dist/index.js   || { echo "❌ Missing dist/index.js"; exit 1; }
          test -f dist/index.cjs  || { echo "❌ Missing dist/index.cjs"; exit 1; }
          test -f dist/index.d.ts || { echo "❌ Missing dist/index.d.ts"; exit 1; }
          test -f dist/index.css  || { echo "❌ Missing dist/index.css"; exit 1; }

          echo "✅ Build artifacts verified"

          echo ""
          echo "dist/"
          ls -lh dist

      - name: Validate version
        if: github.event_name == 'release'
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          RELEASE_VERSION="${{ github.event.release.tag_name }}"
          RELEASE_VERSION="${RELEASE_VERSION#v}"

          if [ "$PACKAGE_VERSION" != "$RELEASE_VERSION" ]; then
            echo "❌ package.json version ($PACKAGE_VERSION) does not match release tag ($RELEASE_VERSION)"
            exit 1
          fi

          echo "✅ Version matches release tag"

      - name: Check version availability
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "❌ $PACKAGE_NAME@$PACKAGE_VERSION already exists on npm"
            exit 1
          fi

          echo "✅ Version is available"

      - name: Validate npm package
        run: |
          echo "Running npm pack --dry-run..."
          npm pack --dry-run

          echo ""
          echo "Package statistics"

          npm pack --dry-run --json \
            | node -e '
              const p=JSON.parse(require("fs").readFileSync(0,"utf8"))[0];
              console.log(`Size: ${p.size} bytes`);
              console.log(`Unpacked: ${p.unpackedSize} bytes`);
              console.log(`Files: ${p.files.length}`);
            '

      - name: Publish to npm
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry-run) }}
        run: npm publish --access public --provenance

      - name: Verify publication
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry-run) }}
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          echo "Waiting for npm propagation..."

          for i in $(seq 1 12); do
            if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
              echo "✅ Package is live!"
              echo "https://www.npmjs.com/package/$PACKAGE_NAME/v/$PACKAGE_VERSION"
              exit 0
            fi

            echo "Attempt $i/12..."
            sleep 10
          done

          echo "⚠️ Package published but registry propagation is still in progress."

      - name: Summary
        if: always()
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          {
            echo "# 📦 Publish Summary"
            echo
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Package | \`$PACKAGE_NAME@$PACKAGE_VERSION\` |"
            echo "| Trigger | \`${{ github.event_name }}\` |"
            echo "| Status | \`${{ job.status }}\` |"

            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "| Dry Run | \`${{ inputs.dry-run }}\` |"
            fi

            if [ "${{ github.event_name }}" = "release" ]; then
              echo "| Release | ${{ github.event.release.tag_name }} |"
            fi

            echo

            if [ "${{ job.status }}" = "success" ] && [ "${{ github.event_name }}" != "workflow_dispatch" -o "${{ inputs.dry-run }}" != "true" ]; then
              echo "## Installation"
              echo '```bash'
              echo "npm install $PACKAGE_NAME"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
