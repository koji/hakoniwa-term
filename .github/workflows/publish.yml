name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run (validate and pack without publishing)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write  # Required for --provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22.22.0"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Build
        run: pnpm run build

      - name: Verify build output
        run: |
          echo "Verifying dist contents..."
          test -f dist/index.js    || { echo "❌ Missing dist/index.js (ESM)"; exit 1; }
          test -f dist/index.cjs   || { echo "❌ Missing dist/index.cjs (CJS)"; exit 1; }
          test -f dist/index.d.ts  || { echo "❌ Missing dist/index.d.ts (types)"; exit 1; }
          test -f dist/index.css   || { echo "❌ Missing dist/index.css (styles)"; exit 1; }
          echo "✅ All expected build artifacts present"
          echo ""
          echo "📦 dist/ contents:"
          ls -lh dist/

      - name: Validate version
        if: github.event_name == 'release'
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          RELEASE_VERSION="${{ github.event.release.tag_name }}"
          RELEASE_VERSION="${RELEASE_VERSION#v}"

          if [ "$PACKAGE_VERSION" != "$RELEASE_VERSION" ]; then
            echo "❌ Version mismatch: package.json=$PACKAGE_VERSION, release tag=$RELEASE_VERSION"
            exit 1
          fi
          echo "✅ Version $PACKAGE_VERSION matches release tag"

      - name: Check if version already published
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version > /dev/null 2>&1; then
            echo "❌ $PACKAGE_NAME@$PACKAGE_VERSION is already published on npm"
            exit 1
          fi
          echo "✅ $PACKAGE_NAME@$PACKAGE_VERSION is available for publishing"

      - name: Pack dry run
        run: |
          echo "📦 npm pack --dry-run:"
          npm pack --dry-run 2>&1
          echo ""
          TARBALL_SIZE=$(npm pack --dry-run --json 2>/dev/null | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'))[0]?.size || 'unknown'")
          echo "📊 Package size: $TARBALL_SIZE bytes"

      - name: Publish to npm
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry-run) }}
        run: pnpm publish --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify publication
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry-run) }}
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          echo "Waiting for npm registry propagation..."
          for i in $(seq 1 5); do
            sleep 10
            if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version > /dev/null 2>&1; then
              echo "✅ $PACKAGE_NAME@$PACKAGE_VERSION is live on npm"
              echo "🔗 https://www.npmjs.com/package/$PACKAGE_NAME/v/$PACKAGE_VERSION"
              exit 0
            fi
            echo "  Attempt $i/5 — not yet available..."
          done
          echo "⚠️ Package published but not yet visible (registry propagation delay)"

      - name: Summary
        if: always()
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          DRY_RUN="${{ github.event_name == 'workflow_dispatch' && inputs.dry-run }}"

          {
            echo "# 📦 Publish Summary"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Package | \`$PACKAGE_NAME@$PACKAGE_VERSION\` |"
            echo "| Trigger | \`${{ github.event_name }}\` |"
            echo "| Status | \`${{ job.status }}\` |"
            if [ "$DRY_RUN" = "true" ]; then
              echo "| Mode | 🏜️ **Dry Run** |"
            fi
            if [ "${{ github.event_name }}" = "release" ]; then
              echo "| Release | [${{ github.event.release.tag_name }}](${{ github.event.release.html_url }}) |"
            fi
            echo ""
            if [ "${{ job.status }}" = "success" ] && [ "$DRY_RUN" != "true" ]; then
              echo "### 📥 Install"
              echo '```sh'
              echo "npm install $PACKAGE_NAME"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
